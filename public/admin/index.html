<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Trimsel CMS</title>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://unpkg.com/decap-cms@3.1.10/dist/decap-cms.js"></script>
</head>
<body>
  <script>
    CMS.init({
      config: {
        backend: {
          name: "github",
          repo: "Trimsel/trimsel_website_new",
          branch: "main",
          base_url: "https://www.trimsel.com",
          auth_endpoint: "/api/auth"
        },
        publish_mode: "editorial_workflow",
        media_folder: "public/images/blog",
        public_folder: "/images/blog",
        collections: [
          {
            name: "blog",
            label: "Blog Posts",
            label_singular: "Blog Post",
            folder: "content/blog",
            create: true,
            slug: "{{slug}}",
            extension: "mdx",
            format: "frontmatter",
            preview_path: "blog/{{slug}}",
            editor: {
              preview: true
            },
            fields: [
              { label: "Title", name: "title", widget: "string" },
              {
                label: "Publish Date",
                name: "date",
                widget: "datetime",
                format: "YYYY-MM-DD",
                time_format: false
              },
              { label: "Author", name: "author", widget: "string", default: "Trimsel" },
              {
                label: "Excerpt",
                name: "excerpt",
                widget: "text",
                hint: "Short summary shown on the blog listing page and used as the meta description fallback."
              },
              { label: "Cover Image", name: "coverImage", widget: "image", choose_url: true },
              { label: "Thumbnail", name: "thumbnailUrl", widget: "image", choose_url: true },
              { label: "Tags", name: "tags", widget: "list" },
              {
                label: "SEO",
                name: "seo",
                widget: "object",
                collapsed: true,
                fields: [
                  {
                    label: "Allow Indexing",
                    name: "indexing",
                    widget: "boolean",
                    default: true,
                    required: false,
                    hint: "Uncheck to add noindex — use for thin or duplicate content."
                  },
                  { label: "Meta Title", name: "metaTitle", widget: "string", required: false },
                  { label: "Meta Description", name: "metaDescription", widget: "text", required: false },
                  {
                    label: "Canonical URL",
                    name: "canonicalUrl",
                    widget: "string",
                    required: false,
                    hint: "Leave blank to auto-generate https://www.trimsel.com/blog/<slug>"
                  },
                  { label: "OG Image", name: "ogImage", widget: "image", choose_url: true, required: false },
                  {
                    label: "Custom JSON-LD",
                    name: "jsonLd",
                    widget: "text",
                    required: false,
                    hint: "Optional raw JSON-LD schema (must be valid JSON). Leave blank to use auto-generated Article schema."
                  }
                ]
              },
              {
                label: "FAQ",
                name: "faq",
                widget: "list",
                required: false,
                collapsed: true,
                summary: "{{fields.question}}",
                fields: [
                  { label: "Question", name: "question", widget: "string" },
                  { label: "Answer", name: "answer", widget: "text" }
                ]
              },
              { label: "Body", name: "body", widget: "markdown" }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
